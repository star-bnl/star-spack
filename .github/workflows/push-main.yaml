name: Main Push Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

# A newer push supersedes and cancels any in-progress run so only the latest
# main commit continues publishing images.
concurrency:
  group: push-main
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.starenv }}-${{ matrix.compiler }}
    strategy:
      matrix:
        starenv: [root5, root6]
        compiler: [gcc485, gcc11]
    uses: ./.github/workflows/build.yaml
    with:
      starenv: ${{ matrix.starenv }}
      compiler: ${{ matrix.compiler }}
      optimize-runtime: true
      image-tag: latest
