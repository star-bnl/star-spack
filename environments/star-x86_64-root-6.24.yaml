spack:
  include:
    - $spack/../environments/packages.yaml
    - $spack/../environments/modules.yaml
    - $spack/../environments/concretizer.yaml
  config:
    build_stage:
      - $spack/var/spack/stage
  specs:
    - boost
    - clhep
    - eigen
    - fastjet
    - geant3
    - geant4
    - geant4-vmc
    - g4ensdfstate@2.2
    - g4neutronxs@1.4
    - g4photonevaporation@5.3
    - g4saiddata@2.0
    - genfit
    - gsl
    - kitrack
    - libxml2
    - log4cxx
    - mysql
    - rave
    - root@6.24.06 ~vc ~vmc
    - star-env@0.4.0
    - star-table
    - vc@0.7.4
    - vmc
  packages:
    all:
      target: [x86_64]
  view: false
